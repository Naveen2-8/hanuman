<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | HanumanFitness</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0b0b0b;
      --surface: #1a1a1a;
      --yellow: #FFD700;
      --text-main: #FFFFFF;
      --text-muted: #888888;
      --border: rgba(255, 255, 255, 0.08);
      --red: #ef4444;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Oswald', sans-serif;
      --font-logo: 'Bebas Neue', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    
    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center;
    }
    
    .brand-logo {
      font-family: var(--font-logo);
      font-size: 2.2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .brand-logo b { color: var(--yellow); font-weight: normal; }
    .brand-logo svg { color: var(--yellow); width: 32px; height: 32px; }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label {
      display: block;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--yellow); }
    
    #error-msg {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: -10px;
      margin-bottom: 15px;
      display: none;
      background: rgba(239, 68, 68, 0.1);
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    
    .btn-submit {
      width: 100%;
      background: var(--yellow);
      color: var(--bg);
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-heading);
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.2);
    }
    
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--yellow); }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-dumbbell"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>
      Hanuman<b>Fitness</b>
    </div>
    <div class="subtitle">Admin Dashboard Access</div>
    
    <div id="error-msg">Invalid username or password.</div>
    
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Secure Login</button>
    </form>
    
    <a href="index.html" class="back-link">← Return to Website</a>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      
      if (user === 'admin' && pass === 'hanuman@2024') {
        sessionStorage.setItem('hf_admin_logged_in', 'true');
        window.location.href = 'admin.html';
      } else {
        errorMsg.style.display = 'block';
        
        // Shake animation for error
        const container = document.querySelector('.login-container');
        container.style.transform = 'translateX(-10px)';
        setTimeout(() => container.style.transform = 'translateX(10px)', 50);
        setTimeout(() => container.style.transform = 'translateX(-10px)', 100);
        setTimeout(() => container.style.transform = 'translateX(10px)', 150);
        setTimeout(() => container.style.transform = 'translateX(0)', 200);
      }
    });
  </script>
</body>
</html>
